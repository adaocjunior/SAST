name: Analise Estatica (SAST)

on: [push, pull_request]

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install bandit

      - name: Executar SAST
        run: bandit -r . -f custom

  appscan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Instalar dependencias e executar aplicacao
        run: |
          pip install -r requirements.txt
          nohup python3 app.py &
          sleep 5

      - name: Executar AppScan DAST
        uses: HCL-TECH-SOFTWARE/appscan-dast-action@v1.0.7
        with:
          baseurl: "https://cloud.appscan.com"
          target: "http://localhost:5000"
          asoc_key: ${{ secrets.APPSCAN_API_KEYID }}
          asoc_secret: ${{ secrets.APPSCAN_API_SECRET }}
          application_id: 1392fcd5-bd11-406c-b1ec-a334a963e705