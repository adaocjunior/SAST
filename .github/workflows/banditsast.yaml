name: Analise Estatica (SAST)

on: [push, pull_request]

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: instalar depencencias
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Instalar bandit
        run: pip install bandit
      - name: Executar SAST
        run: bandit -r . -f custom
